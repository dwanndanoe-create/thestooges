<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MicroJobs SR – Kies een rol</title>
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body class="chooser-body">

  <div class="chooser-overlay">
    <div class="chooser-card">
      <h2>Kies een rol</h2>
      <p class="chooser-subtitle">
        Ben je een jongere die wil bijverdienen, of heb je een klus die gedaan moet worden?
      </p>

      <div class="chooser-options">
        <a href="worker.html" class="chooser-btn">
          <div class="chooser-icon circle">
            👤
          </div>
          <span>Werknemer / Jongere</span>
          <small>Vind korte klusjes in jouw buurt.</small>
        </a>

        <a href="employer.html" class="chooser-btn">
          <div class="chooser-icon">
            💼
          </div>
          <span>Werkgever / Opdrachtgever</span>
          <small>Plaats kleine taken en help jongeren aan eerlijk werk.</small>
        </a>
      </div>
    </div>
  </div>
<script src="/js/main.js"></script>
</body>
</html>
