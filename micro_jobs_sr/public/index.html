<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MicroJobs SR – Kies een rol</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body class="chooser-body">

  <div class="chooser-overlay">
    
    <div class="chooser-logo-container">
      <img src="img/microjobs-logo.jpg" onerror="this.src='img/microjobs-logo.png'" alt="MicroJobs SR Logo" class="chooser-main-logo" />
    </div>

    <div class="chooser-card">
      <h2>Kies een rol</h2>
      <p class="chooser-subtitle">
        Ben je een jongere die wil bijverdienen, of heb je werk dat gedaan moet worden?
      </p>

      <div class="chooser-options">
        
        <a href="worker.html" class="chooser-btn">
          <div class="chooser-image-wrapper">
            <img src="img/user2.png" alt="Werkgever / Opdrachtgever" class="chooser-img" />
          </div>
          
          <span>Werknemer / Jongere</span>
          <small>Vind werk in jouw buurt en verdien direct bij.</small>
        </a>

        <a href="employer.html" class="chooser-btn">
          <div class="chooser-image-wrapper">
            <img src="img/worker.jpg" alt="Werknemer / Jongere" class="chooser-img" />
          </div>
          <span>Werkgever / Opdrachtgever</span>
          <small>Plaats kleine taken en help Surinaamse jongeren aan eerlijk werk.</small>
        </a>
        
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
